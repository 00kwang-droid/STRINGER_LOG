<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스트링일지">
<meta name="theme-color" content="#0b0d0c">
<title>스트링 작업일지</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0b0d0c;color:#f1f4f2;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.6;}
body{overflow:hidden;}

:root{
  --text-primary:#f1f4f2;
  --text-secondary:#b4b2a9;
  --text-muted:#888780;
  --bg-dark:#0b0d0c;
  --bg-surface:#161a18;
  --bg-surface-2:#1d221f;
  --line:rgba(255,255,255,0.06);
  --line-2:rgba(255,255,255,0.12);
  --accent:#4fe38b;
  --accent-deep:#1c8f52;
  --accent-soft:rgba(79,227,139,0.12);
  --serif:'Crimson Text', serif;
  --mono:'JetBrains Mono', monospace;
}

.app{display:flex;flex-direction:column;height:100vh;background:var(--bg-dark);}
.screen{display:none;flex-direction:column;flex:1;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;}

/* ════ HEADER ════ */
.header{
  background:var(--bg-surface);
  border-bottom:1px solid var(--line-2);
  padding:20px;
  flex-shrink:0;
}
.header-title{
  font-family:var(--serif);
  font-size:28px;
  font-weight:600;
  letter-spacing:-0.5px;
  margin-bottom:4px;
}
.header-sub{
  font-size:12px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1.2px;
}

/* ════ CONTENT ════ */
.content{
  flex:1;
  overflow-y:auto;
  padding:24px 20px;
  max-width:700px;
  margin:0 auto;
  width:100%;
}

/* ════ STAT SECTION ════ */
.stat-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:32px;
}
.stat-card{
  background:var(--bg-surface);
  border:1px solid var(--line);
  padding:16px;
  border-radius:0;
}
.stat-label{
  font-size:11px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin-bottom:8px;
  display:block;
}
.stat-num{
  font-family:var(--mono);
  font-size:24px;
  font-weight:700;
  color:var(--accent);
}

/* ════ ENTRY LIST ════ */
.entry-list{
  display:flex;
  flex-direction:column;
  gap:1px;
  border:1px solid var(--line);
}
.entry-item{
  background:var(--bg-surface);
  padding:16px 20px;
  cursor:pointer;
  border-bottom:1px solid var(--line);
  transition:background .15s;
  text-decoration:none;
  color:inherit;
  display:block;
}
.entry-item:hover{background:var(--bg-surface-2);}
.entry-item:last-child{border-bottom:none;}

.entry-date{
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-muted);
  display:block;
  margin-bottom:6px;
}
.entry-racket{
  font-size:13px;
  color:var(--text-primary);
  font-weight:500;
  display:block;
  margin-bottom:4px;
}
.entry-string{
  font-size:12px;
  color:var(--text-secondary);
}

/* ════ EMPTY STATE ════ */
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--text-secondary);
}
.empty-title{
  font-family:var(--serif);
  font-size:18px;
  margin-bottom:8px;
  color:var(--text-primary);
}
.empty-desc{
  font-size:13px;
  line-height:1.6;
}

/* ════ BUTTONS ════ */
.btn{
  background:var(--accent);
  color:#05130b;
  border:none;
  padding:12px 24px;
  border-radius:0;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
  transition:background .15s;
}
.btn:hover{background:#3fce79;}
.btn:active{transform:scale(.98);}
.btn-secondary{
  background:transparent;
  border:1px solid var(--line-2);
  color:var(--text-primary);
}
.btn-secondary:hover{background:var(--bg-surface);}

.btn-row{
  display:flex;
  gap:12px;
  margin-top:24px;
}
.btn-row .btn{flex:1;}

/* ════ FORM ════ */
.form-section{
  margin-bottom:32px;
}
.form-section-title{
  font-family:var(--serif);
  font-size:16px;
  font-weight:600;
  margin-bottom:12px;
  color:var(--text-primary);
  padding-bottom:8px;
  border-bottom:1px solid var(--line);
}

.form-group{
  margin-bottom:16px;
  display:flex;
  flex-direction:column;
}
.form-label{
  font-size:12px;
  color:var(--text-secondary);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  font-weight:500;
}
.form-input, .form-select, .form-textarea{
  background:var(--bg-surface);
  border:1px solid var(--line-2);
  color:var(--text-primary);
  padding:10px 12px;
  font-size:13px;
  font-family:inherit;
}
.form-input:focus, .form-select:focus, .form-textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:inset 0 0 0 2px rgba(79,227,139,0.1);
}
.form-textarea{
  resize:vertical;
  min-height:80px;
  font-family:var(--mono);
  font-size:12px;
}

/* ════ DETAIL VIEW ════ */
.detail-row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid var(--line);
  font-size:13px;
}
.detail-row:last-child{border-bottom:none;}
.detail-label{
  color:var(--text-secondary);
  font-weight:500;
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:0.5px;
}
.detail-value{
  color:var(--text-primary);
  text-align:right;
}

/* ════ TABS ════ */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--line-2);
  background:var(--bg-surface);
  gap:0;
}
.tab-btn{
  flex:1;
  background:transparent;
  border:none;
  color:var(--text-secondary);
  padding:12px 16px;
  cursor:pointer;
  font-size:12px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.5px;
  border-bottom:2px solid transparent;
  transition:color .15s;
}
.tab-btn.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}
.tab-btn:hover{color:var(--text-primary);}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* ════ MODAL ════ */
.modal-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--bg-surface);
  border:1px solid var(--line-2);
  max-width:500px;
  width:90%;
  max-height:80vh;
  overflow-y:auto;
}
.modal-header{
  padding:20px;
  border-bottom:1px solid var(--line);
}
.modal-title{
  font-family:var(--serif);
  font-size:18px;
  font-weight:600;
}
.modal-body{
  padding:20px;
}
.modal-footer{
  padding:20px;
  border-top:1px solid var(--line);
  display:flex;
  gap:12px;
}
.modal-footer .btn{flex:1;}

/* ════ RATING ════ */
.rating-group{
  display:flex;
  gap:12px;
  margin:12px 0;
}
.rating-btn{
  background:var(--bg-surface);
  border:1px solid var(--line-2);
  color:var(--text-secondary);
  width:40px;
  height:40px;
  border-radius:0;
  cursor:pointer;
  font-weight:600;
  transition:all .15s;
}
.rating-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
}
.rating-btn.active{
  background:var(--accent);
  color:#05130b;
  border-color:var(--accent);
}

/* ════ AXIS RATING ════ */
.axis-item{
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:12px;
}
.axis-label{
  font-size:12px;
  color:var(--text-secondary);
  min-width:80px;
  text-transform:uppercase;
  letter-spacing:0.4px;
  font-weight:500;
}
.axis-slider{
  flex:1;
  height:2px;
  background:var(--line-2);
  border:none;
  cursor:pointer;
  -webkit-appearance:none;
  appearance:none;
}
.axis-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:16px;
  height:16px;
  background:var(--accent);
  cursor:pointer;
  border:1px solid var(--accent);
}
.axis-slider::-moz-range-thumb{
  width:16px;
  height:16px;
  background:var(--accent);
  cursor:pointer;
  border:1px solid var(--accent);
  border-radius:50%;
}
.axis-value{
  font-family:var(--mono);
  font-size:11px;
  color:var(--accent);
  min-width:30px;
  text-align:right;
}

/* ════ TOAST ════ */
.toast{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:var(--bg-surface);
  border:1px solid var(--line-2);
  padding:12px 16px;
  color:var(--text-primary);
  font-size:12px;
  opacity:0;
  transition:opacity .3s;
  z-index:900;
}
.toast.show{opacity:1;}

/* ════ RESPONSIVE ════ */
@media (max-width:600px){
  .header{padding:16px;}
  .header-title{font-size:24px;}
  .content{padding:16px;}
  .stat-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="app">
  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="header">
      <div class="header-sub">스트링 작업일지</div>
      <div class="header-title">기록<span style="color:var(--accent);">.</span></div>
    </div>
    <div class="content">
      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-label">총 작업 수</span>
          <div class="stat-num" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <span class="stat-label">최근 작업</span>
          <div class="stat-num" id="stat-recent">—</div>
        </div>
      </div>

      <button class="btn" onclick="showScreen('screen-add')" style="width:100%;margin-bottom:24px;">새 작업 추가</button>

      <div id="home-list">
        <div class="empty-state">
          <div class="empty-title">아직 기록이 없습니다</div>
          <div class="empty-desc">스트링 작업을 기록하고 성능을 분석해보세요.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT SCREEN -->
  <div class="screen" id="screen-add">
    <div class="header">
      <div class="header-sub">작업 기록</div>
      <div class="header-title" id="add-title">새 작업<span style="color:var(--accent);">.</span></div>
    </div>
    <div class="content">
      <!-- 라켓 정보 -->
      <div class="form-section">
        <div class="form-section-title">라켓 정보</div>
        <div class="form-group">
          <label class="form-label">브랜드</label>
          <select class="form-select" id="racket-brand" onchange="updateRacketModels()">
            <option value="">선택</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">모델</label>
          <select class="form-select" id="racket-model">
            <option value="">선택</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">헤드 사이즈 (in²)</label>
          <input type="number" class="form-input" id="racket-headsize" min="80" max="125" value="100">
        </div>
      </div>

      <!-- 스트링 정보 -->
      <div class="form-section">
        <div class="form-section-title">스트링 정보</div>
        <div class="form-group">
          <label class="form-label">브랜드</label>
          <select class="form-select" id="string-brand" onchange="updateStringModels()">
            <option value="">선택</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">모델</label>
          <select class="form-select" id="string-model">
            <option value="">선택</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">게이지 (mm)</label>
          <input type="text" class="form-input" id="string-gauge" placeholder="예: 1.20">
        </div>
        <div class="form-group">
          <label class="form-label">설정 텐션 (lbs)</label>
          <input type="number" class="form-input" id="string-tension" step="0.5" placeholder="예: 52">
        </div>
      </div>

      <!-- 작업 정보 -->
      <div class="form-section">
        <div class="form-section-title">작업 정보</div>
        <div class="form-group">
          <label class="form-label">작업 일자</label>
          <input type="date" class="form-input" id="work-date">
        </div>
        <div class="form-group">
          <label class="form-label">작업 장소</label>
          <input type="text" class="form-input" id="work-place" placeholder="장소 입력">
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="showScreen('screen-home')">취소</button>
        <button class="btn" id="save-btn" onclick="saveEntry()">저장</button>
      </div>
    </div>
  </div>

  <!-- DETAIL SCREEN -->
  <div class="screen" id="screen-detail">
    <div class="header">
      <div class="header-sub">작업 상세</div>
      <div class="header-title" id="detail-racket">상세 정보<span style="color:var(--accent);">.</span></div>
    </div>
    <div class="content">
      <div class="form-section">
        <div class="form-section-title">라켓</div>
        <div class="detail-row"><span class="detail-label">브랜드</span><span class="detail-value" id="d-rb">—</span></div>
        <div class="detail-row"><span class="detail-label">모델</span><span class="detail-value" id="d-rm">—</span></div>
        <div class="detail-row"><span class="detail-label">헤드</span><span class="detail-value" id="d-rh">—</span></div>
      </div>

      <div class="form-section">
        <div class="form-section-title">스트링</div>
        <div class="detail-row"><span class="detail-label">브랜드</span><span class="detail-value" id="d-sb">—</span></div>
        <div class="detail-row"><span class="detail-label">모델</span><span class="detail-value" id="d-sm">—</span></div>
        <div class="detail-row"><span class="detail-label">게이지</span><span class="detail-value" id="d-sg">—</span></div>
        <div class="detail-row"><span class="detail-label">텐션</span><span class="detail-value" id="d-st">—</span></div>
      </div>

      <div class="form-section">
        <div class="form-section-title">작업</div>
        <div class="detail-row"><span class="detail-label">일자</span><span class="detail-value" id="d-date">—</span></div>
        <div class="detail-row"><span class="detail-label">장소</span><span class="detail-value" id="d-place">—</span></div>
      </div>

      <!-- 피드백 탭 -->
      <div class="form-section">
        <div class="form-section-title">평가</div>
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('fb-list')">피드백</button>
          <button class="tab-btn" onclick="switchTab('fb-add')">추가</button>
        </div>
        <div id="fb-list" class="tab-content active" style="margin-top:16px;">
          <div id="feedback-list" style="font-size:12px;color:var(--text-secondary);">피드백 없음</div>
        </div>
        <div id="fb-add" class="tab-content" style="margin-top:16px;">
          <div class="form-group">
            <label class="form-label">평점 (1-5)</label>
            <div class="rating-group" id="fb-rating">
              <button class="rating-btn" data-val="1" onclick="setRating(1)">1</button>
              <button class="rating-btn" data-val="2" onclick="setRating(2)">2</button>
              <button class="rating-btn" data-val="3" onclick="setRating(3)">3</button>
              <button class="rating-btn" data-val="4" onclick="setRating(4)">4</button>
              <button class="rating-btn" data-val="5" onclick="setRating(5)">5</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">성능 분석</label>
            <div class="axis-item">
              <span class="axis-label">파워</span>
              <input type="range" class="axis-slider" id="fb-power" min="0" max="5" value="3" step="0.1" onchange="updateAxisVal(this)">
              <span class="axis-value" id="fb-power-val">3.0</span>
            </div>
            <div class="axis-item">
              <span class="axis-label">컨트롤</span>
              <input type="range" class="axis-slider" id="fb-control" min="0" max="5" value="3" step="0.1" onchange="updateAxisVal(this)">
              <span class="axis-value" id="fb-control-val">3.0</span>
            </div>
            <div class="axis-item">
              <span class="axis-label">스핀</span>
              <input type="range" class="axis-slider" id="fb-spin" min="0" max="5" value="3" step="0.1" onchange="updateAxisVal(this)">
              <span class="axis-value" id="fb-spin-val">3.0</span>
            </div>
            <div class="axis-item">
              <span class="axis-label">편안함</span>
              <input type="range" class="axis-slider" id="fb-comfort" min="0" max="5" value="3" step="0.1" onchange="updateAxisVal(this)">
              <span class="axis-value" id="fb-comfort-val">3.0</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">의견</label>
            <textarea class="form-textarea" id="fb-memo" placeholder="사용한 느낌을 자유롭게 적어주세요..."></textarea>
          </div>
          <button class="btn" onclick="saveFeedback()" style="width:100%;">피드백 저장</button>
        </div>
      </div>

      <div class="btn-row" style="margin-top:32px;">
        <button class="btn btn-secondary" onclick="showScreen('screen-home')">목록</button>
        <button class="btn btn-secondary" onclick="editEntry()">수정</button>
        <button class="btn btn-secondary" style="background:rgba(255,0,0,0.1);color:#ff6b6b;border-color:rgba(255,0,0,0.3);" onclick="deleteEntry()">삭제</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div class="screen" id="screen-settings">
    <div class="header">
      <div class="header-sub">앱 설정</div>
      <div class="header-title">설정<span style="color:var(--accent);">.</span></div>
    </div>
    <div class="content">
      <div class="form-section">
        <div class="form-section-title">일반</div>
        <div class="form-group">
          <label class="form-label">언어</label>
          <select class="form-select" id="set-lang">
            <option value="ko">한국어</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">기본 헤드 사이즈</label>
          <select class="form-select" id="set-headsize">
            <option value="98">98 in²</option>
            <option value="100" selected>100 in²</option>
            <option value="105">105 in²</option>
          </select>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">데이터</div>
        <button class="btn btn-secondary" style="width:100%;margin-bottom:12px;" onclick="exportData()">데이터 내보내기</button>
        <button class="btn btn-secondary" style="width:100%;" onclick="importData()">데이터 복원</button>
        <input type="file" id="import-file" style="display:none;" accept=".json">
      </div>

      <div style="text-align:center;padding:40px 0;color:var(--text-muted);font-size:11px;">
        <div>스트링 작업일지 v3.0</div>
        <div style="margin-top:4px;">Editorial Edition</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2000);
}

function updateAxisVal(el){
  const val=(parseFloat(el.value)).toFixed(1);
  document.getElementById(el.id+'-val').textContent=val;
}

function setRating(val){
  document.querySelectorAll('.rating-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-val="${val}"]`).classList.add('active');
}

document.getElementById('work-date').valueAsDate=new Date();
</script>
</body>
</html>
